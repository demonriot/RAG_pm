services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: copilot-postgres
    environment:
      POSTGRES_USER: copilot
      POSTGRES_PASSWORD: copilot
      POSTGRES_DB: copilot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: copilot-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: copilot-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: copilot-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - .:/app

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: copilot-worker
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - .:/app

  embed-worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: copilot-embed-worker
    command: ["python", "-u", "-m", "app.embeddings.worker"]
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - minio
    restart: unless-stopped

volumes:
  pgdata:
  minio_data:
